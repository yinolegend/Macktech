<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0b74ff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Command Center" />
    <link rel="apple-touch-icon" href="/icons/icon-192.svg" />
    <title>Admin Redirect | Command Center</title>
    <link rel="stylesheet" href="/css/unified-theme.css" />
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #eff4fc, #f7f9fd);
        color: #173152;
        font-family: "Segoe UI", sans-serif;
      }

      .bridge-card {
        width: min(480px, calc(100vw - 32px));
        padding: 28px;
        border-radius: 24px;
        border: 1px solid rgba(23, 49, 82, 0.1);
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 20px 50px rgba(23, 49, 82, 0.12);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 30px;
      }

      p {
        margin: 0;
        line-height: 1.6;
        color: #4f6783;
      }
    </style>
  </head>
  <body>
    <main class="bridge-card">
      <h1>Redirecting Admin Access</h1>
      <p>The Admin Console now lives at <strong>/admin-console</strong>. Existing bookmarks to <strong>/admin.html</strong> are forwarded automatically.</p>
    </main>

    <script>
      (function redirectLegacyAdminPage() {
        const token = localStorage.getItem('command_center_token');
        if (token) {
          window.location.replace('/admin-console');
          return;
        }
        window.location.replace('/login.html?portal=admin');
      })();
    </script>
    <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(function(){});
    }
  </script>
</body>
</html>
