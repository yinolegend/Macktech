<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Welcome — Command Center</title>
    <link rel="stylesheet" href="css/unified-theme.css" />
    <style>
      /* Blue-focused theme for landing */
      /* Make the landing card use most of the viewport so it feels like a full-screen panel */
      .card { width:94vw; max-width:1400px; min-height:90vh; background:white; border-radius:12px; box-shadow:0 8px 40px rgba(11,27,60,0.08); overflow:hidden; border:1px solid rgba(11,116,255,0.06); display:flex; flex-direction:column }
      .hero { position:relative; padding:64px 36px 48px 36px; display:flex; flex-direction:column; align-items:center; gap:28px; border-bottom:1px solid #f2f6ff; flex:0 0 auto }
      .hero h1 { margin:0; font-size:clamp(28px,4vw,42px); color:var(--brand); font-weight:600; letter-spacing:-0.5px }
      .hero nav { display:flex; gap:12px; align-items:center; flex-wrap:wrap }
      .hero p { margin:6px 0 0 0; color:var(--muted) }
      .slides { position:relative; padding:28px; flex:1 1 auto; overflow:hidden; }
      .slides-viewport { width:100%; overflow:hidden; }
      .slides-track {
        display:flex;
        width:100%;
        transition:transform 520ms cubic-bezier(0.22, 0.61, 0.36, 1);
        will-change:transform;
      }
      .slide-page {
        flex:0 0 100%;
        min-width:100%;
        box-sizing:border-box;
      }
      .slide-arrow {
        position:absolute;
        top:50%;
        transform:translateY(-50%);
        width:42px;
        height:42px;
        border-radius:999px;
        border:1px solid #d8e7ff;
        background:rgba(255,255,255,0.95);
        color:#0b74ff;
        font-size:24px;
        line-height:1;
        display:flex;
        align-items:center;
        justify-content:center;
        cursor:pointer;
        box-shadow:0 8px 20px rgba(11,27,60,0.12);
        z-index:5;
        opacity:0;
        pointer-events:none;
        transition:transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      }
      .slide-arrow:hover {
        background:#ffffff;
        transform:translateY(-50%) scale(1.04);
        box-shadow:0 12px 24px rgba(11,27,60,0.16);
      }
      .slide-arrow:disabled {
        opacity:0.4;
        cursor:not-allowed;
      }
      .slide-arrow.left { left:10px; }
      .slide-arrow.right { right:10px; }
      .slides:hover .slide-arrow,
      .slides.show-arrows .slide-arrow,
      .slides:focus-within .slide-arrow {
        opacity:1;
        pointer-events:auto;
      }
      .slide { padding:24px; box-sizing:border-box; display:none; width:100%; flex-direction:column; justify-content:space-between; border-radius:14px; box-shadow:0 6px 24px rgba(11,27,60,0.08); border:1px solid #e8f0ff; background:linear-gradient(180deg,#ffffff,#fbfdff); transition:transform 0.2s ease, box-shadow 0.2s ease; cursor:default; min-height:280px; }
      .slide.active { display:flex; animation:slideFade 0.25s ease; }
      .slide:hover{ transform:translateY(-2px); box-shadow:0 10px 28px rgba(11,27,60,0.12); }
      .slide.announcement-slide{ justify-content:flex-start; text-align:left; gap:12px; }
      .slide.announcement-slide > div{ width:100%; }
      .slide.announcement-slide .announcement-body{ margin:0; }
      .slide > div:first-child{ flex:1 1 auto; }
      .slide > div:last-child{ flex:0 0 auto; margin-top:auto; }
      .slide.slide-multi { padding:0; border:0; background:transparent; box-shadow:none; min-height:auto; }
      .slide.slide-multi.active { display:block; }
      .slide.slide-multi:hover { transform:none; box-shadow:none; }
      .slide.slide-multi > div:last-child { margin-top:0; }
      .slide-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:18px; align-items:stretch; }
      .slide-grid.count-1 { grid-template-columns:1fr; }
      .slide-grid.count-2 { grid-template-columns:repeat(2,minmax(0,1fr)); }
      .slide-grid.count-3 { grid-template-columns:repeat(3,minmax(0,1fr)); }
      .announcement-card { padding:22px; border-radius:14px; border:1px solid #e8f0ff; background:linear-gradient(180deg,#ffffff,#fbfdff); box-shadow:0 6px 24px rgba(11,27,60,0.08); cursor:pointer; display:flex; flex-direction:column; min-height:280px; transition:transform 0.2s ease, box-shadow 0.2s ease; }
      .announcement-card:hover { transform:translateY(-4px); box-shadow:0 12px 32px rgba(11,27,60,0.14); }
      .announcement-card .announcement-body { max-height:130px; }
      .announcement-body{ font-size:clamp(14px,1.6vw,17px); line-height:1.5; max-height:180px; overflow:hidden; margin-bottom:12px; color:#41506e; }
      .announcement-body p{ margin-top:0; margin-bottom:12px; }
      .announcement-body img{ max-width:100%; height:auto; border-radius:8px; margin:12px 0; }
      .announcement-thumb{ display:block; width:100%; max-height:160px; object-fit:cover; border-radius:10px; margin:0 0 12px 0; background:#e7f1ff; box-shadow:0 8px 20px rgba(11,27,60,0.1); }
      .announcement-attachment-note{ margin:8px 0 0 0; font-size:12px; color:#5d6f92; font-weight:600; }
      .controls { display:flex; padding:14px 24px 18px; justify-content:center; align-items:center; background:linear-gradient(180deg, #fbfdff, #f7fbff) }
      .dot-row { display:flex; gap:10px; align-items:center; background:#fff; border:1px solid #d8e7ff; padding:8px 12px; border-radius:999px; box-shadow:0 8px 22px rgba(11,27,60,0.08) }
      .dot { width:9px; height:9px; border-radius:50%; background:#bfd5ff; border:0; cursor:pointer; padding:0; transition:transform 0.2s ease, background 0.2s ease, width 0.2s ease }
      .dot:hover { transform:scale(1.15); }
      .dot.active { width:26px; border-radius:999px; background:linear-gradient(90deg,#0b74ff,#3d96ff) }
      @keyframes slideFade {
        from { opacity:0.2; transform:translateX(8px); }
        to { opacity:1; transform:translateX(0); }
      }
      .cta { display:flex; gap:8px }
      .btn { padding:11px 18px; border-radius:8px; border:0; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; font-size:15px; font-weight:500; transition:all 0.2s ease }
      .btn.primary { background:var(--brand); color:white; box-shadow:0 2px 8px rgba(11,116,255,0.15) }
      .btn.primary:hover { background:#0962e0; box-shadow:0 4px 12px rgba(11,116,255,0.25); transform:translateY(-1px) }
      .btn.ghost { background:transparent; border:1px solid rgba(11,116,255,0.12); color:var(--brand) }
      .btn.login-cta {
        background: linear-gradient(135deg, #0b74ff 0%, #0a98ff 100%);
        color: #ffffff;
        border: 1px solid rgba(255,255,255,0.35);
        box-shadow: 0 10px 26px rgba(11,116,255,0.28), inset 0 1px 0 rgba(255,255,255,0.35);
        padding: 10px 18px;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      .btn.login-cta:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 28px rgba(11,116,255,0.34), inset 0 1px 0 rgba(255,255,255,0.35);
      }
      .menu-dropdown { position:relative; display:inline-block }
      .menu-dropdown > summary { list-style:none }
      .menu-dropdown > summary::-webkit-details-marker { display:none }
      .menu-dropdown[open] > summary { background:#0962e0 }
      .menu-dropdown .dropdown-menu { display:none; position:absolute; top:calc(100% + 8px); left:0; min-width:160px; padding:6px; border:1px solid #dfeaff; border-radius:8px; background:#fff; box-shadow:0 10px 24px rgba(11,27,60,0.12); z-index:20 }
      .menu-dropdown[open] .dropdown-menu { display:block }
      .menu-dropdown .dropdown-menu a { display:block; padding:9px 12px; border-radius:6px; color:var(--brand); text-decoration:none; font-weight:500 }
      .menu-dropdown .dropdown-menu a:hover { background:#eef5ff }
      .hero .login-links{ position:absolute; top:20px; right:20px; display:flex; gap:10px }
      .hero .login-links .btn{ min-width:120px; justify-content:center }
      /* Responsive adjustments for smaller screens */
      @media (max-width: 900px) {
        .slides { padding: 20px; }
        .slide-grid { grid-template-columns: repeat(2,minmax(0,1fr)); }
        .slide-grid.count-1 { grid-template-columns:1fr; }
        .hero { padding: 40px 24px 32px 24px; }
        .hero .login-links { position: static; margin-top: 12px; }
      }
      @media (max-width: 600px) {
        body { padding: 12px 0; }
        .card { border-radius: 8px; }
        .slides { padding: 16px; }
        .slide { min-height: 240px; padding: 20px; }
        .slide-grid { grid-template-columns: 1fr; gap: 14px; }
        .announcement-card { min-height: 240px; padding: 20px; }
        .slide-arrow { width:36px; height:36px; font-size:20px; }
        .slide-arrow.left { left:6px; }
        .slide-arrow.right { right:6px; }
        .hero nav { justify-content: center; }
      }
      @media (hover: none), (pointer: coarse) {
        .slide-arrow {
          opacity:1;
          pointer-events:auto;
        }
      }
      h2 { margin:0 0 6px 0 }
      p.lead { color:var(--muted) }
    </style>
  </head>
  <body class="theme-unified page-index">
    <!-- Clean landing page. Links point to /app with hashes to open specific sections. -->
    <div class="card">
      <div class="hero">
        <h1>Command Center</h1>
        <div class="login-links">
          <a class="btn login-cta" href="login.html" data-path="login.html">Login</a>
        </div>
        <nav style="margin-top:20px">
          <details class="menu-dropdown">
            <summary class="btn primary">Departments</summary>
            <div class="dropdown-menu">
              <a href="app.html?department=hr#handbook">HR</a>
              <a href="app.html?department=it#handbook">IT</a>
              <a href="app.html?department=operations#handbook">Operations</a>
              <a href="app.html?department=finance#handbook">Finance</a>
              <a href="app.html?department=quality#handbook">Quality</a>
              <a href="app.html?department=safety#handbook">Safety</a>
            </div>
          </details>
          <a class="btn primary" href="app.html#chat">Chat</a>
          <a class="btn primary" href="app.html#map">Map</a>
          <a class="btn primary" href="announcements.html">Announcements</a>
          <a class="btn primary" href="#">New Ticket</a>
        </nav>
          <div style="margin-left:auto" class="cta">
        </div>
        <!-- userInfo removed from public landing (admin login via modal) -->
        <div style="margin-left:16px; display:flex; align-items:center">
        </div>
      </div>

      <div class="slides" id="slides">
        <div class="slides-viewport">
          <div class="slides-track" id="slidesTrack"></div>
        </div>
        <button type="button" class="slide-arrow left" id="slideLeft" aria-label="Previous announcements">‹</button>
        <button type="button" class="slide-arrow right" id="slideRight" aria-label="Next announcements">›</button>
        <!-- Open Ticket slide removed (use 'New Ticket' or Help instead) -->

        <!-- Help slide removed -->
      </div>

      <div class="controls" id="sliderControls">
        <div class="dot-row" id="dots" aria-label="Announcement slides"></div>
      </div>
    </div>

    <script>
      // Landing page script cheat-sheet:
      // 1. Manage the hero slider (built-in slides + announcements feed).
      // 2. Wire CTA buttons so non-technical staff can relink them easily.
      // The logic is grouped in sections below so you can jump to the part you
      // care about without reading everything.

      // Slide controller: small, dependency-free.
      const dots = document.getElementById('dots');
      const slidesContainer = document.getElementById('slides');
      const slidesTrack = document.getElementById('slidesTrack');
      const sliderControls = document.getElementById('sliderControls');
      const slideLeft = document.getElementById('slideLeft');
      const slideRight = document.getElementById('slideRight');
      let currentSlideIndex = 0;
      let sliderAutoAdvance = null;
      const AUTO_ADVANCE_MS = 8000;
      const AUTO_SLIDE_MIN_ANNOUNCEMENTS = 3;
      let autoSlideEnabled = false;
      // Load announcements into the slider by fetching the static JSON file.
      // If the fetch fails (e.g., opened via file://), we gracefully keep the existing slides.
      function isAnnouncementExpired(item){
        if (!item) return false;
        const value = item.expiresAt || item.expires_at;
        if (!value) return false;
        const ts = Date.parse(value);
        if (Number.isNaN(ts)) return false;
        return ts < Date.now();
      }

      function isAnnouncementHidden(item){
        if (!item) return false;
        const value = item.hidden;
        if (typeof value === 'string') {
          const normalized = value.trim().toLowerCase();
          return normalized === 'true' || normalized === '1' || normalized === 'yes';
        }
        return value === true;
      }

      function sanitizeAnnouncementBody(html){
        const container = document.createElement('div');
        container.className = 'announcement-body';
        if (typeof html === 'string' && html.trim()){
          container.innerHTML = html;
        }
        // Remove editor-only artifacts before showing on landing page.
        container.querySelectorAll('.resize-handle').forEach(el => el.remove());
        container.querySelectorAll('.editor-image-wrapper').forEach(wrapper => {
          wrapper.removeAttribute('contenteditable');
          wrapper.removeAttribute('draggable');
          wrapper.removeAttribute('data-configured');
          wrapper.classList.remove('selected', 'dragging');
        });
        const hiddenAttachmentNodes = Array.from(container.querySelectorAll('.editor-media-file, .editor-media[data-media-type="pdf"], .editor-media-pdf'));
        let hiddenAttachmentCount = hiddenAttachmentNodes.length;
        hiddenAttachmentNodes.forEach(node => node.remove());

        const standaloneAttachmentNodes = Array.from(container.querySelectorAll('.pdf-thumb-card, .pdf-thumbnail-card, .pdf-preview, iframe, .file-attachment-link'))
          .filter(node => !node.closest('.editor-media-file, .editor-media[data-media-type="pdf"], .editor-media-pdf'));
        hiddenAttachmentCount += standaloneAttachmentNodes.length;
        standaloneAttachmentNodes.forEach(node => {
          const attachmentRoot = node.closest('.pdf-preview, .pdf-thumbnail-card, .pdf-thumb-card') || node;
          if (attachmentRoot && attachmentRoot.parentNode) attachmentRoot.remove();
        });

        if (!container.textContent.trim() && hiddenAttachmentCount > 0){
          const note = document.createElement('p');
          note.className = 'announcement-attachment-note';
          note.textContent = hiddenAttachmentCount === 1 ? 'Contains 1 attachment.' : `Contains ${hiddenAttachmentCount} attachments.`;
          container.appendChild(note);
        }
        return container;
      }

      function normalizeAnnouncementImageUrl(value){
        return String(value || '').trim();
      }

      function buildAnnouncementThumbnail(url, title){
        const source = normalizeAnnouncementImageUrl(url);
        if (!source) return null;
        const img = document.createElement('img');
        img.className = 'announcement-thumb';
        img.src = source;
        img.alt = title ? `${title} thumbnail` : 'Announcement thumbnail';
        img.loading = 'lazy';
        img.addEventListener('error', () => img.remove());
        return img;
      }

      function resolveAnnouncementThumbnailUrl(item){
        const explicit = normalizeAnnouncementImageUrl(item && item.image);
        if (explicit) return explicit;

        const html = item && (item.body || item.html || '');
        if (typeof html !== 'string' || !html.trim()) return '';

        const probe = document.createElement('div');
        probe.innerHTML = html;
        probe.querySelectorAll('.editor-media-file, .editor-media-pdf, .pdf-thumb-card, .pdf-thumbnail-card, .pdf-preview, iframe').forEach(node => node.remove());
        const firstImage = probe.querySelector('img[src]');
        if (!firstImage) return '';

        const source = normalizeAnnouncementImageUrl(firstImage.getAttribute('src') || firstImage.src || '');
        if (!source || /\.pdf([?#].*)?$/i.test(source)) return '';
        return source;
      }

      function createAnnouncementCard(a, idx){
        const card = document.createElement('article');
        card.className = 'announcement-card';

        const left = document.createElement('div');
        const thumbnail = buildAnnouncementThumbnail(resolveAnnouncementThumbnailUrl(a), a.title || 'Announcement');
        if (thumbnail){
          left.appendChild(thumbnail);
        }
        const h = document.createElement('h2');
        h.textContent = a.title || 'Announcement';
        h.style.fontSize = 'clamp(20px,2.2vw,24px)';
        h.style.marginBottom = '10px';
        h.style.color = '#0b2a6f';
        const dateText = a.date ? new Date(a.date).toLocaleDateString() : '';
        const authorText = a.author || '';
        const meta = document.createElement('div');
        meta.style.color = '#8a98b3';
        meta.style.marginBottom = '12px';
        meta.style.fontSize = '13px';
        const metaParts = [dateText, authorText].filter(Boolean);
        meta.textContent = metaParts.length ? metaParts.join(' • ') : '';
        const bodyFragment = sanitizeAnnouncementBody(a.body || a.html || '');
        left.appendChild(h);
        if (meta.textContent){
          left.appendChild(meta);
        }
        if (bodyFragment.childNodes.length){
          left.appendChild(bodyFragment);
        }

        const right = document.createElement('div');
        right.style.marginTop = '12px';
        const open = document.createElement('a');
        open.className = 'btn primary';
        open.href = 'announcements.html?id=' + encodeURIComponent(String((a && a.id !== undefined && a.id !== null && a.id !== '') ? a.id : idx)) + '&mode=single';
        open.textContent = 'Read More';
        open.style.fontSize = '14px';
        open.onclick = (e) => { e.stopPropagation(); };
        right.appendChild(open);

        card.appendChild(left);
        card.appendChild(right);

        const announcementId = (a && a.id !== undefined && a.id !== null && a.id !== '') ? a.id : idx;
        card.addEventListener('click', ()=>{
          const target = 'announcements.html?id=' + encodeURIComponent(String(announcementId)) + '&mode=single';
          openRelative(target);
        });
        return card;
      }

      function buildSlideGroups(items){
        const groups = [];
        let cursor = 0;
        while (cursor < items.length){
          const remaining = items.length - cursor;
          // Avoid a lonely single-card page: split 4 as 2+2.
          if (remaining === 4){
            groups.push(items.slice(cursor, cursor + 2));
            groups.push(items.slice(cursor + 2, cursor + 4));
            break;
          }
          const groupSize = Math.min(3, remaining);
          groups.push(items.slice(cursor, cursor + groupSize));
          cursor += groupSize;
        }
        return groups;
      }

      function appendEmptySlide(){
        const page = document.createElement('div');
        page.className = 'slide-page';
        const grid = document.createElement('div');
        grid.className = 'slide-grid count-1';
        const card = document.createElement('article');
        card.className = 'announcement-card';
        card.style.cursor = 'default';
        const left = document.createElement('div');
        const h = document.createElement('h2');
        h.textContent = 'No Announcements Yet';
        h.style.fontSize = 'clamp(20px,2.5vw,26px)';
        h.style.marginBottom = '10px';
        h.style.color = '#0b2a6f';
        const p = document.createElement('p');
        p.className = 'announcement-body';
        p.textContent = 'Check back soon for updates.';
        left.appendChild(h);
        left.appendChild(p);
        card.appendChild(left);
        grid.appendChild(card);
        page.appendChild(grid);
        slidesTrack.appendChild(page);
      }

      function getCurrentSlides(){
        return Array.from(slidesTrack.querySelectorAll('.slide-page'));
      }

      function updateArrowVisibility(totalSlides){
        const show = totalSlides > 1;
        if (slideLeft) slideLeft.style.display = show ? 'flex' : 'none';
        if (slideRight) slideRight.style.display = show ? 'flex' : 'none';
        if (!show){
          slidesContainer.classList.remove('show-arrows');
        }
      }

      function setActiveSlide(index, immediate){
        const currentSlides = getCurrentSlides();
        if (!currentSlides.length){
          currentSlideIndex = 0;
          slidesTrack.style.transform = 'translateX(0%)';
          return;
        }
        const total = currentSlides.length;
        currentSlideIndex = ((index % total) + total) % total;
        if (immediate){
          const previousTransition = slidesTrack.style.transition;
          slidesTrack.style.transition = 'none';
          slidesTrack.style.transform = `translateX(-${currentSlideIndex * 100}%)`;
          requestAnimationFrame(()=>{
            slidesTrack.style.transition = previousTransition || '';
          });
        } else {
          slidesTrack.style.transform = `translateX(-${currentSlideIndex * 100}%)`;
        }
        dots.querySelectorAll('.dot').forEach((dot, dotIndex)=>{
          dot.classList.toggle('active', dotIndex === currentSlideIndex);
        });
      }

      function stopAutoAdvance(){
        if (sliderAutoAdvance){
          clearInterval(sliderAutoAdvance);
          sliderAutoAdvance = null;
        }
      }

      function startAutoAdvance(){
        stopAutoAdvance();
        if (!autoSlideEnabled) return;
        const currentSlides = getCurrentSlides();
        if (currentSlides.length <= 1) return;
        sliderAutoAdvance = setInterval(()=>{
          setActiveSlide(currentSlideIndex + 1);
        }, AUTO_ADVANCE_MS);
      }

      function renderDots() {
        dots.innerHTML = '';
        const currentSlides = getCurrentSlides();
        updateArrowVisibility(currentSlides.length);
        if (sliderControls) sliderControls.style.display = currentSlides.length > 1 ? 'flex' : 'none';
        currentSlides.forEach((_, idx)=>{
          const dot = document.createElement('button');
          dot.type = 'button';
          dot.className = 'dot';
          dot.setAttribute('aria-label', `Go to slide ${idx + 1}`);
          dot.addEventListener('click', ()=>{
            setActiveSlide(idx);
            startAutoAdvance();
          });
          dots.appendChild(dot);
        });
        if (currentSlideIndex >= currentSlides.length) currentSlideIndex = 0;
        setActiveSlide(currentSlideIndex, true);
        startAutoAdvance();
      }

      if (slideLeft){
        slideLeft.addEventListener('click', (ev)=>{
          ev.preventDefault();
          ev.stopPropagation();
          setActiveSlide(currentSlideIndex - 1);
          startAutoAdvance();
        });
      }
      if (slideRight){
        slideRight.addEventListener('click', (ev)=>{
          ev.preventDefault();
          ev.stopPropagation();
          setActiveSlide(currentSlideIndex + 1);
          startAutoAdvance();
        });
      }
      slidesContainer.addEventListener('mouseenter', ()=>{
        slidesContainer.classList.add('show-arrows');
      });
      slidesContainer.addEventListener('mouseleave', ()=>{
        slidesContainer.classList.remove('show-arrows');
      });

      async function loadAnnouncements() {
        let visibleAnnouncements = [];
        slidesTrack.innerHTML = '';
        try {
          const res = await fetch('/api/public/announcements', { cache: 'no-store' });
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const list = await res.json();
          if (Array.isArray(list)){
            visibleAnnouncements = list.filter(item => !isAnnouncementHidden(item) && !isAnnouncementExpired(item));
          }
        } catch (err) {
          console.warn('Could not load announcements.json for index slider:', err);
        }

        const groups = buildSlideGroups(visibleAnnouncements);
        let announcementIndex = 0;
        groups.forEach((group)=>{
          const page = document.createElement('div');
          page.className = 'slide-page';
          const grid = document.createElement('div');
          grid.className = `slide-grid count-${group.length}`;
          group.forEach((announcement)=>{
            grid.appendChild(createAnnouncementCard(announcement, announcementIndex));
            announcementIndex += 1;
          });
          page.appendChild(grid);
          slidesTrack.appendChild(page);
        });

        if (!visibleAnnouncements.length){
          appendEmptySlide();
        }
        autoSlideEnabled = visibleAnnouncements.length > AUTO_SLIDE_MIN_ANNOUNCEMENTS;
        renderDots();
      }

      (async ()=>{ await loadAnnouncements(); })();
      // Wire the quick-create ticket button to open the ticket form
      function openRelative(path) {
        // If path is absolute (starts with /) use as-is, otherwise resolve relative to current document
        if (!path) return;
        if (path.startsWith('/')) { window.location.href = path; return; }
        // Remove any query/hash from current url, then append path
        try {
          const href = window.location.href;
          // If URL ends with a slash, append directly
          if (href.endsWith('/')) {
            window.location.href = href + path;
          } else {
            // Replace last segment (file or empty) with path
            const base = href.replace(/\/[^\/]*([?#].*)?$/, '/');
            window.location.href = base + path;
          }
        } catch (e) { window.location.href = path; }
      }

      // Wire up navigation buttons
      document.querySelectorAll('nav a[href="#"]').forEach(btn => {
        btn.addEventListener('click', (e) => { 
          e.preventDefault(); 
          if (btn.textContent.includes('New Ticket')) openRelative('Ticketform.html');
          else if (btn.textContent.includes('Tickets')) openRelative('Ticketform.html');
        });
      });

      // Make sure the hero login buttons always resolve correctly even if index
      // is served from a subpath (e.g., behind a proxy).
      document.querySelectorAll('.login-links a[data-path]').forEach(link => {
        link.addEventListener('click', (e)=>{
          e.preventDefault();
          const target = link.getAttribute('data-path');
          if (target) openRelative(target);
        });
      });

      // Listen for announcement.created events to refresh the slider in real-time
      (function(){
        const s = document.createElement('script'); s.src = '/socket.io/socket.io.js';
        s.onload = ()=>{
          try{
            const sock = io();
            const refresh = ()=> loadAnnouncements();
            sock.on('announcement.created', refresh);
            sock.on('announcement.updated', refresh);
            sock.on('announcement.deleted', refresh);
            sock.on('announcement.toggled', refresh);
          }catch(e){ console.warn('socket.io not available', e); }
        };
        document.head.appendChild(s);
      })();
    </script>
  </body>
</html>
